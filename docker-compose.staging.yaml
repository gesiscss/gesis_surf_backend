version: "3.9"

services:
  app:
    container_name: api_GESIS_staging
    build:
      context: .
    restart: always
    volumes:
      - static-data:/vol/static
    environment:
      - DB_HOST=db
      - DB_NAME=dbname
      - DB_USER=rootuser
      - DB_PASSWORD=changeme
      - DJANGO_SECRET_KEY=changeme
      - DJANGO_ALLOWED_HOSTS=localhost,127.0.0.1
    depends_on:
      - db

  db:
    container_name: db_GESIS_staging
    image: postgres:13.3-alpine
    restart: always
    environment:
      - POSTGRES_DB=dbname
      - POSTGRES_USER=rootuser
      - POSTGRES_PASSWORD=changeme
    volumes:
      - postgres-data:/var/lib/postgresql/data

  # Simplified proxy service, assuming no SSL or using self-signed certs
  proxy:
    container_name: proxy_GESIS_staging
    build:
      context: ./docker/proxy
    restart: always
    depends_on:
      - app
    ports:
      - 80:80
      - 443:443
    volumes:
      - static-data:/vol/static
      - certbot-web:/vol/www
      - proxy-dhparams:/vol/proxy
      - certbot-certs:/etc/letsencrypt
    environment:
      - DOMAIN=staging.example.com

  # The certbot service could be omitted or left in a skipped state as in production
  certbot:
    image: certbot/certbot
    command: echo "Certbot not used in staging"
    volumes:
      - certbot-web:/var/www
      - certbot-certs:/etc/letsencrypt

volumes:
  static-data:
  postgres-data:
  certbot-web:
  certbot-certs:
  proxy-dhparams:
