default_install_hook_types:
  - pre-commit
  - pre-push
default_language_version:
  python: python3.10
repos:
  - hooks:
      - id: check-added-large-files
      - id: check-shebang-scripts-are-executable
      - id: check-merge-conflict
      - id: check-toml
      - id: check-yaml
      - id: trailing-whitespace
      - id: end-of-file-fixer
    repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
  - hooks:
      - additional_dependencies:
          - types-aiofiles
          - types-pyOpenSSL
          - types-ujson
          - types-requests
          - django
          - django-stubs
          - djangorestframework
          - djangorestframework-stubs
          - mypy-extensions
        id: mypy
        exclude: ^(.*/)?(models/)?
        name: typecheck
    repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
  - hooks:
      - id: autoflake
        name: remove unused imports
    repo: https://github.com/PyCQA/autoflake
    rev: v2.3.0
  - hooks:
      - id: black
        name: format
    repo: https://github.com/psf/black
    rev: 24.2.0
  - hooks:
      - id: commitizen
      - id: commitizen-branch
        stages:
          - push
    repo: https://github.com/commitizen-tools/commitizen
    rev: v3.15.0
  - repo: https://github.com/adamchainz/django-upgrade
    rev: 1.16.0
    hooks:
      - id: django-upgrade
        args: [--target-version, "4.1"] # Replace with Django version
  - hooks:
      - additional_dependencies:
          - prettier@2.5.1
          - "@prettier/plugin-xml@1.2.0"
        id: prettier
        types_or:
          - javascript
          - css
          - markdown
          - json
          - graphql
          - yaml
    repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
  - hooks:
      - additional_dependencies:
          - eslint@8.6.0
          - eslint-config-prettier@8.3.0
          - eslint-config-google@0.14.0
        args:
          - --fix
        id: eslint
    repo: https://github.com/pre-commit/mirrors-eslint
    rev: v9.0.0-beta.0
  - repo: https://github.com/pre-commit/mirrors-pylint
    rev: v3.0.0a5
    hooks:
      - id: pylint
        args:
          [
            "--load-plugins=pylint_django",
            "--disable=django-not-configured",
            "--output-format=colorized",
            "--jobs=4",
          ]
        files: \.(py|html|js)$
        exclude: ^(.*/)?(migrations|static|node_modules|build|dist|\.cache|\.git|\.hg|\.svn|\.tox|\.venv|_build|buck-out|build|dist|node_modules|\.mypy_cache|\.pytest_cache|\.tox|\.venv|venv)/
        additional_dependencies:
          - django
          - djangorestframework
          - django-stubs
          - djangorestframework-stubs
          - pylint-django
          - drf-spectacular
  - hooks:
      - id: curlylint
    repo: https://github.com/thibaudcolas/curlylint
    rev: v0.13.1
  - hooks:
      - args:
          - --tabwidth=2
        id: djhtml
    repo: https://github.com/rtts/djhtml
    rev: 3.0.6
  - hooks:
      - args:
          - --py310-plus
        id: pyupgrade
    repo: https://github.com/asottile/pyupgrade
    rev: v3.15.1
  - hooks:
      - id: black
    repo: https://github.com/psf/black
    rev: 24.2.0
  - hooks:
      - additional_dependencies:
          - black==23.11.0
        id: blacken-docs
    repo: https://github.com/asottile/blacken-docs
    rev: 1.16.0
  - hooks:
      - id: isort
    repo: https://github.com/pycqa/isort
    rev: 5.13.2
  - hooks:
      - additional_dependencies:
          - flake8-bugbear
          - flake8-no-pep420
          - flake8-builtins
          - flake8-comprehensions
          - flake8-docstrings
          - flake8-import-order
          - flake8-quotes
          - pep8-naming
          - flake8-annotations
          - flake8-bandit
          - flake8-black
          - flake8-broken-line
          - flake8-bugbear
          - flake8-builtins
          - flake8-comprehensions
          - flake8-docstrings
          - flake8-import-order
          - flake8-quotes
          - pep8-naming
          - flake8-annotations
          - flake8-bandit
          - flake8-black
          - flake8-broken-line
          - flake8-bugbear
          - flake8-builtins
          - flake8-comprehensions
          - flake8-docstrings
          - flake8-import-order
          - flake8-django
        id: flake8
        exclude: ^(.*/)?(migrations|static|node_modules|build|dist|\.cache|\.git|\.hg|\.svn|\.tox|\.venv|_build|buck-out|build|dist|node_modules|\.mypy_cache|\.pytest_cache|\.tox|\.venv|venv)/
    repo: https://github.com/pycqa/flake8
    rev: 7.0.0
